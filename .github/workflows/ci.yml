name: CI - Run Tests

on:
  push:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install dependencies
        run: mvn -B -ntp dependency:go-offline

      - name: Run tests with coverage (fails if coverage < 80%)
        run: mvn -B -ntp verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload JaCoCo HTML coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          if-no-files-found: warn

  mutation:
    name: Mutation Testing (PIT)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run mutation testing
        run: mvn -B -ntp test org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT mutation report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pit-mutation-report
          path: target/pit-reports/
          if-no-files-found: warn
